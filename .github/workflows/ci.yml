name: CI

on:
  # Branch protection requires a PR to merge into main, so the push trigger
  # only ever fires on the merge commit itself. Scoping it to main here
  # avoids a duplicate run on every branch push that also has an open PR
  # (which the pull_request trigger already covers).
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# All third-party actions are pinned to a full commit SHA, not a floating tag.
# The trailing comment records the human-readable version pinned. Renovate /
# Dependabot will propose PRs to bump these as new releases ship.
jobs:
  lint-and-test:
    name: lint + test
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l $(git ls-files '*.go' | grep -v '^example/') || true)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt issues in:"
            echo "$unformatted"
            echo
            echo "Run: gofmt -w $unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet .

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          # Pin the linter binary version explicitly; not "latest".
          version: v2.12.2
          # Explicit package list. Skips example/ (which has multiple
          # package-main files — pre-existing build problem) and benchmarks/
          # (separate module).
          args: --timeout=5m . ./pkg/...

      - name: go test
        run: go test -race -count=1 . ./pkg/...
